# ============================================================================
# AutoScientist — lab-wide configuration (layer 1 of 3)
#
# Resolution order:  experiment yaml  >  project control.yaml  >  THIS FILE
#
# Skills read this file for defaults; every spawned project gets a control.yaml
# (layer 2) that can override the project-scoped sections below. View the
# effective merged config with provenance:
#     uv run --with pyyaml python tools/show_config.py [<project-path>]
# Edit via /configure (or by hand). Full key reference: docs/configuration.md
# ============================================================================

lab:                            # ── hub behavior · PI-owned ──
  projects_root: "../AutoScientist-Projects"  # where /spawn-project creates project repos (relative to hub)
  stale_days: 14                # registry rows older than this get flagged by check_lab.py

compute:                        # ── CROSS-project run coordination · PI-owned ──
  max_concurrent_runs: 1        # training campaigns allowed at once across ALL projects
                                # (one slot = one run.py run or one sweep; tools/run_slots.py)
  stale_slot_minutes: 360       # slots older than this are presumed crashed and reclaimed

agents:                         # ── subagent settings · PI-owned ──
  reviewer_model: inherit       # fresh-context-reviewer (inherit = session model; or sonnet | opus | haiku)
  runner_model: inherit         # experiment-runner
  critic_model: inherit         # ideation critics / scoping advocates
  overseer_model: inherit       # overseer verification checks

oversight:                      # ── confabulation circuit-breakers (overseer agent) ──
  level: standard               # off | standard | strict
  # standard: verifies author-response verdicts (/review-paper) and headline
  #           interpretations (/analyze) against their evidence
  # strict:   also grades every fatal flaw + refutation in meta-reviews and
  #           audits /research-loop "progress" claims at loop exit

ideation:                       # ── /ideate pipeline depth ──
  candidates: 8                 # initial mechanism-diverse candidates
  reflection_rounds: 2          # reflect -> evolve cycles per surviving idea
  critics_per_idea: 2           # parallel fresh-context critic subagents in each reflect pass
  enable_combination: true      # propose crossovers of complementary survivors

scoping:                        # ── /scope deliberation depth ──
  options_per_decision: 3       # alternatives generated per design-decision branch
  advocate_subagents: true      # one parallel advocate per option argues its strongest case
  max_open_questions: 3         # decisions allowed to stay open (resolved by pilots) before /propose

writing:                        # ── /write-paper · /make-figures ──
  max_reflection_rounds: 3      # verifier-gated revision rounds (gains plateau ~3, regress after)
  citation_match_threshold: 0.85 # title-similarity gate for tools/s2.py verify
  page_limit: 9                 # target main-text pages; over-length trimmed gradually

critique:                       # ── /critique-paper · /review-paper · PI-owned ──
  ensemble_external: 3          # reviewer lenses for external-paper triage
  ensemble_own_draft: 5         # reviewer lenses for our own paper drafts
  score_anchor_human_mean: 5.4  # calibration anchor — the human-review average Overall
  max_review_cycles: 3          # revision cycles before escalating to the PI

experiment:                     # ── experiment loop defaults · project-overridable via control.yaml ──
  max_debug_depth: 3            # consecutive debug attempts before record-and-move-on
  num_drafts: 3                 # distinct solution lines /improve maintains
  max_parallel_subagents: 3     # concurrent worktree subagents
  multi_seed_n: 3               # seeds required before a number is paper-grade

loop:                           # ── /research-loop defaults · project-overridable via control.yaml ──
  no_progress_backoff_cycles: 3 # consecutive no-progress cycles before the loop stops
  monitor_poll_seconds: 300     # cadence for zero-token status.py polling
