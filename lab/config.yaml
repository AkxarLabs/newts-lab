# ============================================================================
# Newts' Lab — lab-wide configuration (layer 1 of 3)
#
# Resolution order:  experiment yaml  >  project control.yaml  >  THIS FILE
#
# Skills read this file for defaults; every spawned project gets a control.yaml
# (layer 2) that can override the project-scoped sections below. View the
# effective merged config with provenance:
#     uv run --with pyyaml python tools/show_config.py [<project-path>]
# Edit via /configure (or by hand). Full key reference: docs/configuration.md
# ============================================================================

lab:                            # ── hub behavior · PI-owned ──
  projects_root: "../newts-lab-projects"  # where /spawn-project creates project repos (relative to hub)
  stale_days: 14                # registry rows older than this get flagged by check_lab.py

compute:                        # ── CROSS-project run coordination · PI-owned ──
  max_concurrent_runs: 1        # training campaigns allowed at once across ALL projects. 1 (default) =
                                # training is globally serialized (the safe single-machine default).
                                # Raise it to the number of GPUs/slots your machine can run in parallel.
                                # (one slot = one run.py run or one sweep; tools/run_slots.py)
  stale_slot_minutes: 360       # slots older than this are presumed crashed and reclaimed

agents:                         # ── subagent settings · PI-owned ──
                                # Applied via the `model:` frontmatter of .claude/agents/<role>.md
                                # (inherit = session model; or sonnet | opus | haiku). /configure and
                                # /setup-lab keep that frontmatter in sync when these change.
  reviewer_model: inherit       # → .claude/agents/fresh-context-reviewer.md
  runner_model: inherit         # → .claude/agents/experiment-runner.md
  overseer_model: inherit       # → .claude/agents/overseer.md
  critic_model: inherit         # ideation critics / scoping advocates — these are INLINE
                                # (general-purpose) subagents with no agent file, so this value
                                # cannot be applied; they always run at the session model.

  programmatic:                 # ── headless TOP-LEVEL agents launched by tools/agent_runner.py ──
                                # The hub orchestrator can spawn an independent headless session
                                # (claude -p / codex exec) PER project, coordinated by the compute-
                                # slot ledger — NOT a nested subagent. This WIDENS autonomy (N
                                # autonomous sessions writing to N repos), so it is PI-owned and OFF
                                # by default. Widen it only on explicit PI request (/configure) or
                                # transitively under a PI-signed /autopilot campaign brief — the same
                                # rule as ideation.in_project_approval / loop.explore_*.
    enabled: false              # MASTER SWITCH · ships OFF (the safe default). false = manual sessions +
                                # in-session Task subagents only (no headless launching). Set true (via
                                # /configure, or transitively under a signed /autopilot brief) to let
                                # agent_runner launch headless top-level agents. Required for
                                # autopilot.max_concurrent_projects > 1.
    backend: claude             # default backend: claude | codex. Default ALL to claude. (codex needs
                                # the `codex` CLI + auth; per-launch override via --backend.)
    model: inherit              # GLOBAL model override across backends. inherit/blank = each backend uses
                                # its own backends.<x>.model default below; a real value here forces ALL.
    permission_mode: auto       # claude --permission-mode. `auto` broadly auto-approves work INSIDE
                                # the project repo (so it rarely stops to ask) yet still BLOCKS
                                # dangerous ops — curl|bash, force-push / push to main, destructive
                                # git (reset --hard, clean -fd), irreversible deletes, infra destroy.
                                # Paired with the project's permissions.allow engine allowlist
                                # (templates/project/.claude/settings.json) so routine `uv run …`
                                # commands are ALWAYS allowed and never accumulate blocks. A blocked
                                # op is denied (never silently bypassed); the agent escalates it to the
                                # bus and the PI answers via a directive. NOT bypassPermissions.
                                # (Fail-safe: in headless -p, repeated blocks abort the session — the
                                #  allowlist keeps routine work from ever tripping it.)
                                # (codex uses the sandbox + approval keys below, not this knob.)
    max_minutes: 240            # wall-clock cap per launched agent — the watchdog kills the tree on breach
    max_concurrent: 3           # PER-PROJECT ceiling on concurrently-launched agents. Lab-wide fleet
                                # size ≈ autopilot.max_concurrent_projects × this; the expensive part
                                # (TRAINING) is globally serialized by compute.max_concurrent_runs.
    max_depth: 1                # launch-recursion cap. 1 = hub→project only; a launched agent may NOT
                                # launch further agents (mirrors the no-nested-subagents rule)
    max_transcript_mb: 200      # cap each agent's stored stdout transcript (.bus/agents/*.stream.jsonl);
                                # a runaway/looping agent can't fill the disk before the watchdog. 0 = unlimited.
    backends:                   # per-backend invocation knobs. The safety-critical flags are REFUSED in
                                # extra_args (so they can't silently negate human-in-loop); set them
                                # through these DEDICATED keys instead — change as needed.
      claude:
        model: claude-opus-4-8  # per-backend default model. Full id PINS the version (the `opus` alias
                                # can drift to a newer model over time); blank/inherit = the CLI default.
        effort: high            # claude --effort: low | medium | high | xhigh | max (Opus 4.8 default
                                # is high). Combines with --model. Blank = the model's default effort.
        permission_mode: ""     # per-backend override of programmatic.permission_mode above (blank =
                                # use that default). e.g. `acceptEdits` / `plan` / `dontAsk` /
                                # `bypassPermissions` (PI-owned) for the claude backend only.
        extra_args: ""          # appended to `claude -p` (advanced; --permission-mode and
                                # --dangerously-skip-permissions are refused — use permission_mode above)
      codex:
        model: gpt-5.5          # per-backend default model (codex -m). Slug pattern gpt-5.<minor>[-mini|
                                # -codex]; availability is account/auth-dependent — verify on the host.
        reasoning_effort: medium  # codex has NO --effort flag; this passes -c model_reasoning_effort=…
                                # (minimal | low | medium | high | xhigh). Blank = the model default.
        sandbox: workspace-write  # codex --sandbox — the codex equivalent of claude's auto+allowlist.
                                # workspace-write = OS-enforced sandbox: edit files + run commands
                                # INSIDE the repo, network OFF by default (a HARDER boundary than the
                                # claude classifier, so codex needs no allowlist). Paired with the
                                # `approval` key below (default `never`): a sandbox-forbidden op FAILS
                                # and the agent escalates it to the bus — codex exec has no per-call
                                # human approval routing. read-only = stricter; danger-full-access
                                # removes the boundary entirely (PI-owned escape hatch — avoid).
        approval: never         # codex -a (--ask-for-approval): `never` = autonomous headless (the only
                                # sane value for codex exec — `on-request`/`untrusted` are interactive
                                # and will stall or fail in exec). PI-owned.
        network_access: false   # workspace-write turns network OFF by default; set true to let codex
                                # reach the network for a genuine need (passes
                                # `-c sandbox_workspace_write.network_access=true`). PI-owned capability
                                # widening; the codex config key is version-dependent — verify if it errors.
        extra_args: ""          # appended to `codex exec` (advanced; --sandbox / -a /
                                # --dangerously-bypass-approvals-and-sandbox / --yolo are refused — use
                                # the sandbox / approval keys above)

autopilot:                      # ── /autopilot campaign defaults · PI-owned ──
  max_concurrent_projects: 1    # how many projects /autopilot drives end-to-end AT ONCE. 1 (default) =
                                # ONE project carried fully through the pipeline before the next is
                                # spawned (the safe, single-session default). >1 = concurrent multi-
                                # project mode, which REQUIRES agents.programmatic.enabled (one headless
                                # top-level session per project, slot-coordinated); without that enable
                                # flag, autopilot stays single-session and works one project at a time.
                                # TRAINING is still capped by compute.max_concurrent_runs either way.

oversight:                      # ── confabulation circuit-breakers (overseer agent) ──
  level: standard               # off | standard | strict
  # standard: verifies author-response verdicts (/review-paper), headline interpretations
  #           (/analyze), /autopilot Gate-1 self-approvals, the /review-paper phantom-
  #           experiment sweep, and any meta-review fatal-flaw refutation that unlocks accept
  # strict:   also grades every fatal flaw (critique-taste) in meta-reviews and audits
  #           /research-loop "progress" claims at loop exit

ideation:                       # ── /ideate pipeline depth ──
  candidates: 8                 # initial mechanism-diverse candidates
  reflection_rounds: 2          # reflect -> evolve cycles per surviving idea
  critics_per_idea: 2           # parallel fresh-context critic subagents in each reflect pass
  enable_combination: true      # propose crossovers of complementary survivors
  in_project: true              # allow `/ideate --in-project <slug>`: divergent METHOD-approach
                                # ideation WITHIN a project's frozen problem/eval/test/seeds/budgets
                                # (output = candidate approaches, NOT experiments; never a new
                                # lifecycle state — active -> active). false = capability off.
  in_project_candidates: 4      # approach candidates an in-project ideation round generates
  in_project_rounds: 1          # max in-project ideation rounds before stopping (so recursion
                                # terminates by config, not convention; each round charges its cost
                                # against the loop envelope minutes / iteration budget)
  in_project_approval: pi       # CAMPAIGN-ONLY knob: it ONLY changes behavior under a signed
                                # /autopilot campaign. MANUAL `/ideate --in-project` runs are ALWAYS
                                # PI-gated regardless of this value. PI-owned (WIDENS authority — edit
                                # only on explicit PI request, or transitively under a PI-signed
                                # /autopilot campaign brief; same rule as loop.explore_*). pi | campaign_auto:
                                #   pi            = surviving approaches always queue at /propose for
                                #                   human Gate 1 (the safe default, incl. under campaigns).
                                #   campaign_auto = UNDER A SIGNED CAMPAIGN ONLY, a surviving approach is
                                #                   auto-approved WITHIN the campaign's delegation bounds +
                                #                   an overseer `support` check (exactly like a Gate-1
                                #                   self-approval); a campaign brief may override back to
                                #                   `pi`. Any headline-hypothesis change re-enters /propose
                                #                   (mini-proposal) or a successor idea — never a bare PI
                                #                   note. Gate 3 is never delegated.

discuss:                        # ── /discuss collaborative human↔agent session ──
  max_research_minutes: 15      # cap on live web/arXiv/Semantic-Scholar research DURING a /discuss
                                # session (it's discussion fuel, not the lit review). 0 = no live
                                # research (Q&A only). The session itself is human-paced and unbounded.

scoping:                        # ── /scope deliberation depth ──
  options_per_decision: 3       # alternatives generated per design-decision branch
  advocate_subagents: true      # one parallel advocate per option argues its strongest case
  max_open_questions: 3         # decisions allowed to stay open (resolved by pilots) before /propose

writing:                        # ── /write-paper · /make-figures ──
  venue: neurips                # target paper format · project control.yaml may override per-project.
                                # /write-paper copies the whole templates/paper/venues/<venue>/ dir —
                                # the official .sty/.bst are VENDORED there, so it compiles offline (no
                                # fetch). See that dir's README.md for versions/limits/anonymity + how to
                                # refresh to a newer cycle. One of:
                                #   neurips  · 1-col, plainnat, ~9pp   (the default; NeurIPS 2025)
                                #   icml     · 2-col, icml2025.bst, ~8pp
                                #   iclr     · 1-col, iclr2026.bst, ~9pp
                                #   aclarr   · 2-col, acl_natbib, ~8pp (ACL Rolling Review)
                                #   aaai     · 2-col, aaai2026.bst, ~7pp (anon submission, strict format)
                                #   generic  · venue-agnostic article (templates/paper/main.tex)
  page_limit: 9                 # target main-text pages; over-length trimmed gradually. Set this to the
                                # chosen venue's limit (neurips/iclr 9 · icml/aclarr 8 · aaai 7) — it is
                                # the authoritative knob; `venue` selects the template, not the count.
  max_reflection_rounds: 3      # verifier-gated revision rounds (gains plateau ~3, regress after)
  citation_match_threshold: 0.85 # title-similarity gate for tools/s2.py verify

critique:                       # ── /critique-paper · /review-paper · PI-owned ──
  ensemble_external: 3          # reviewer lenses for external-paper triage
  ensemble_own_draft: 5         # reviewer lenses for our own paper drafts
  score_anchor_human_mean: 5.4  # calibration anchor — the human-review average Overall
                                # (mirrored in critique-lenses.md; /critique-paper substitutes it)
  accept_bar: 7                 # median Overall at/above this + zero unrefuted fatal flaws = accept
  max_review_cycles: 3          # revision cycles before escalating to the PI

experiment:                     # ── experiment loop defaults · project-overridable via control.yaml ──
  max_debug_depth: 3            # consecutive debug attempts before record-and-move-on
  num_drafts: 3                 # distinct solution lines /improve maintains
  max_parallel_subagents: 3     # concurrent worktree subagents
  multi_seed_n: 3               # seeds required before a number is paper-grade

loop:                           # ── /research-loop defaults · project-overridable via control.yaml ──
  no_progress_backoff_cycles: 3 # consecutive no-progress cycles before the loop stops
  monitor_poll_seconds: 300     # cadence for zero-token status.py polling
  mode: execute                 # execute | explore — the DEFAULT loop mode (the LOOP_BRIEF's
                                # `Mode:` field overrides per-loop). execute = run the approved
                                # plan then stop; explore = autonomous in-project iteration —
                                # frontier expansion + reopening non-headline design decisions,
                                # bounded by the two caps below and the Gate-2 envelope.
                                # See docs/autonomy.md.
  explore_max_expansion_rounds: 0   # explore mode only: how many results-grounded "expand" rounds
                                # may run after the planned table is exhausted. 0 = no frontier
                                # expansion (but in explore mode, reopening a non-headline decision
                                # still fires when its `Revisit if:` trigger does — that is gated by
                                # the mode, not by this cap). Each round is subject to the anti-burn
                                # backoff above.
  explore_max_new_lines_per_round: 3  # explore mode only: max NEW mechanism-distinct lines an
                                # expand round may append to PLAN.md (each with pre-written criteria)

dashboard:                      # ── optional Vivarium dashboard (dashboard/serve.py) ──
  port: 8787                    # local-only; see docs/dashboard.md
