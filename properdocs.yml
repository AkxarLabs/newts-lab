site_name: Newts' Lab
site_description: A research lab for an AI agent — ideation to publication, with the human as PI.
site_url: https://akxarlabs.github.io/newts-lab/
docs_dir: docs
theme:
  name: material
  palette:
    scheme: autoscientist
  font:
    text: Source Serif 4
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
  icon:
    logo: material/flask-outline

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: "§"
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - The workflow: workflow.md
  - Autonomy & modes: autonomy.md
  - Skills reference: skills.md
  - Collaborative sessions (/discuss): discuss.md
  - Configuration: configuration.md
  - Projects: projects.md
  - Project types: project-types.md
  - Target-driven (/compete): compete.md
  - Tools: tools.md
  - Dashboard: dashboard.md
  - Design rationale: DESIGN.md
