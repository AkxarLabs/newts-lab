# Claim → artifact mapping. Every quantitative claim in main.tex gets an entry — whether
# the number lives in a table cell or a sentence. /review-paper verifies each one
# mechanically (and scans main.tex for any unannotated numeral); a claim without a
# verifiable artifact may not appear in the paper. Append entries as claims are written.
#
# project: the project slug — its repo path resolves via lab/REGISTRY.md's Project column,
# else lab.projects_root/<slug>. For an /adopt or oddly-located project, add project_path:
# (absolute, or relative to the hub) to point at it explicitly. commit: git SHA in that repo
# at which the artifact was produced.
# QUOTE numbers as strings to preserve printed precision — "71.30" audits at ±0.005, but the
# bare float 71.30 parses to 71.3 and audits 10x looser at ±0.05.
# metric: (optional) restricts the match to artifact leaves with this final key name, so a
# number can't pass on a coincidental match against an unrelated value.
# artifact_sha256: (optional) added by tools/lock_artifacts.py at /finalize — it copies each
# cited metrics.json into papers/<slug>/artifacts/<rel> and records its sha256 here. After that,
# audit_claims.py resolves artifacts from the hub archive first and `--verify-hashes` checks
# them, so the finalized paper is auditable from the hub alone (the project repo may be gone).

# - id: C001
#   claim: "Our method improves val_bpb by 2.3% over the tuned baseline"
#   numbers: ["2.3"]
#   metric: val_bpb
#   location: "Sec 4.1, Table 2"
#   project: {{slug}}
#   commit: <sha>
#   artifacts:
#     - runs/exp-004-r1-s0/metrics.json
#     - runs/exp-004-r2-s1/metrics.json
#     - runs/exp-004-r3-s2/metrics.json
#   artifact_sha256:                       # filled by tools/lock_artifacts.py at /finalize
#     runs/exp-004-r1-s0/metrics.json: "<sha256>"
#   derivation: "mean over 3 seeds of (baseline.val_bpb - ours.val_bpb)/baseline.val_bpb"

claims: []
