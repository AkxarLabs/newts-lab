# ============================================================================
# {{slug}} — project control file (layer 2 of 3)
#
# Created automatically at spawn; THE end-to-end run controls for this project.
# Resolution order:  experiment yaml  >  THIS FILE  >  hub lab/config.yaml
#
# Edit anytime via /configure or by hand — EXCEPT keys marked PI-owned, which
# require explicit PI approval to change after Gate 1. The gate2_envelope block
# is the canonical machine-readable record of pre-authorized FULL runs (the
# proposal and LOOP_BRIEF carry the human signature and point here).
# ============================================================================

project: "{{slug}}"

budgets:                        # PI-owned after Gate 1 — enforced by the run.py watchdog.
  smoke_max_minutes: 10         # applied per-stage when an experiment yaml doesn't set
  pilot_max_minutes: 60         # budget.max_minutes itself
  full_max_minutes: 240
  total_note: ""                # free-text total compute cap from the proposal (informational)

seeds:
  list: [0, 1, 2]               # default seeds for sweeps
  multi_seed_n: 3               # seeds required before a number is paper-grade

parallelism:
  max_parallel_subagents: 3     # concurrent worktree subagents (/improve)
  sweep_parallel: 1             # default --parallel for scripts/sweep.py

loop:                           # /research-loop overrides for this project
  no_progress_backoff_cycles: 3
  monitor_poll_seconds: 300
  mode: execute                 # execute | explore (the LOOP_BRIEF's Mode: overrides per-loop).
                                # explore enables autonomous in-project re-planning — see below.
  explore_max_expansion_rounds: 0   # explore: results-grounded "expand" rounds allowed after the
                                # planned table is exhausted (0 = behaves like execute)
  explore_max_new_lines_per_round: 3  # explore: max new PLAN.md lines per expand round
  # In explore mode the loop may reopen a NON-headline design decision (decisions.md
  # `Headline: no`) and expand the frontier, as long as the frozen set holds and the
  # gate2_envelope is not exceeded. Touching the frozen set, exceeding the envelope, or
  # reopening a HEADLINE decision escalates (PI note, or campaign-delegation check under
  # a signed /autopilot). explore_* are PI-owned (they widen the agent's authority).

monitoring:
  log_interval_seconds: 60      # expected seconds between ctx.log() calls — pass to
                                # status.py --log-interval so a healthy run that logs
                                # sparsely (per-epoch on real workloads) isn't flagged
                                # stalled. Set this ABOVE your slowest expected log gap.

figures:
  theme: clean                  # clean | warm | bold | mono — see src/project_pkg/figures.py
                                # (same sizing/fonts/vector rules; different palette & vibe)

gate2_envelope:                 # PI-owned. Pre-authorized FULL runs; all zeros/null = no envelope,
  full_runs: 0                  # every FULL run needs fresh PI approval.
  per_run_max_minutes: 0
  total_max_minutes: 0
  expires: null                 # YYYY-MM-DD — checked before each FULL launch (today <= expires)
  pi_signed: false              # PI authority only — set directly by the PI (via /propose Gate 1
                                # or /configure), OR transitively under a PI-signed /autopilot
                                # campaign brief whose delegation bounds cover this envelope.
  signed_via: null              # provenance: null = the PI signed directly; otherwise the path of
                                # the campaign brief that carries the signature (e.g. lab/campaigns/...)

eval_frozen: true               # the eval protocol in PLAN.md/base.yaml is frozen.
                                # The agent may NEVER set this false.
