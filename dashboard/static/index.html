<!DOCTYPE html>
<html lang="en" data-lamp="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vivarium — the living lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="terrarium.css">
</head>
<body data-mode="terrarium">

<!-- ── top bar ───────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="brand">
    <span class="logo-leaf">🌿</span>
    <span class="brand-name">Vivarium</span>
    <span class="brand-sub">the living lab</span>
  </div>
  <nav class="tabs">
    <button class="tab is-active" data-go="terrarium">Terrarium</button>
    <button class="tab" data-go="shelf">Shelf</button>
    <button class="tab" data-go="gates">Gates <span class="badge" id="gateBadge" hidden>0</span></button>
    <button class="tab" data-go="ledger">Ledger</button>
    <button class="tab" data-go="night">Night</button>
  </nav>
  <div class="status">
    <span class="fireflies" id="fireflies" title="compute slots"></span>
    <span class="clock" id="clock" title="last sync">··:··</span>
    <button class="lamp" id="lampToggle" title="day / night">🌙</button>
  </div>
</header>

<!-- ── the stage (view content mounts here) ──────────────────────────────── -->
<main class="stage" id="stage"></main>

<!-- ── Newt's habitat: always-on pool, buddy, lantern, speech ─────────────── -->
<footer class="habitat" id="habitat">
  <div class="lantern" id="lantern" title="PI gates" hidden>
    <span class="lantern-glow"></span><span class="lantern-n" id="lanternN">0</span>
  </div>
  <div class="water"></div>

  <div class="newt-stage" id="newtStage" title="click Newt to command the lab">
    <div class="speech" id="speech" hidden></div>
    <!-- Newt the axolotl — pure SVG, poses toggled by classes on .newt -->
    <svg class="newt" id="newt" viewBox="0 0 200 130" aria-label="Newt the axolotl">
      <ellipse class="newt-shadow" cx="100" cy="116" rx="52" ry="7"/>
      <g class="newt-body">
        <!-- tail -->
        <path class="tail" d="M150 78 q34 -6 40 12 q-6 22 -40 8 z"/>
        <!-- legs -->
        <ellipse class="leg" cx="78" cy="98" rx="9" ry="6"/>
        <ellipse class="leg" cx="128" cy="98" rx="9" ry="6"/>
        <!-- body -->
        <path class="belly" d="M52 74 q60 -34 104 0 q6 24 -16 30 q-36 12 -72 0 q-22 -6 -16 -30 z"/>
        <!-- gills (three frilly stalks each side) -->
        <g class="gills gills-l">
          <path d="M58 52 q-22 -10 -30 -2 q10 6 30 6"/>
          <path d="M58 60 q-26 0 -34 12 q14 2 34 -4"/>
          <path d="M58 68 q-22 10 -26 22 q14 -2 28 -12"/>
        </g>
        <g class="gills gills-r">
          <path d="M142 52 q22 -10 30 -2 q-10 6 -30 6"/>
          <path d="M142 60 q26 0 34 12 q-14 2 -34 -4"/>
          <path d="M142 68 q22 10 26 22 q-14 -2 -28 -12"/>
        </g>
        <!-- head -->
        <path class="head" d="M56 56 q44 -34 88 0 q4 26 -44 26 q-48 0 -44 -26 z"/>
        <!-- face -->
        <circle class="eye" cx="82" cy="58" r="5.2"/><circle class="eye" cx="118" cy="58" r="5.2"/>
        <circle class="glint" cx="83.6" cy="56.4" r="1.7"/><circle class="glint" cx="119.6" cy="56.4" r="1.7"/>
        <circle class="cheek" cx="70" cy="66" r="5"/><circle class="cheek" cx="130" cy="66" r="5"/>
        <path class="smile" d="M92 68 q8 7 16 0"/>
        <!-- props (shown by pose) -->
        <g class="prop zzz"><text x="150" y="40">z</text><text x="162" y="28">z</text><text x="172" y="18">z</text></g>
        <g class="prop spark"><path d="M150 28 l3 8 l8 1 l-6 6 l2 8 l-7 -4 l-7 4 l2 -8 l-6 -6 l8 -1 z"/></g>
        <g class="prop regen"><circle class="regen-bud" cx="150" cy="98" r="7"/><path class="regen-ray" d="M150 86 v-8 M161 92 l6 -5 M139 92 l-6 -5"/></g>
        <g class="prop rain"><path d="M150 22 q14 0 14 12 q0 8 -14 8 q-16 0 -16 -10 q0 -10 16 -10 z"/><path class="drop" d="M142 46 v6 M150 48 v6 M158 46 v6"/></g>
        <g class="prop bubbles"><circle cx="160" cy="60" r="4"/><circle cx="172" cy="48" r="3"/><circle cx="166" cy="36" r="2.2"/></g>
        <g class="prop letter"><rect x="146" y="44" width="30" height="20" rx="3"/><path d="M146 44 l15 11 l15 -11"/></g>
      </g>
    </svg>
  </div>

  <div class="hint" id="hint">click Newt to command the lab →</div>
</footer>

<!-- ── overlays: command console · gate modal · tool drawer ──────────────── -->
<div class="sheet-scrim" id="sheetScrim" hidden></div>
<aside class="sheet" id="sheet" hidden>
  <div class="sheet-head">
    <span id="sheetTitle">Command the lab</span>
    <button class="x" id="sheetClose">✕</button>
  </div>
  <div class="sheet-to">
    <span>send to</span><span class="chips" id="targetChips"></span>
  </div>
  <div class="actions" id="actionGrid"></div>
  <div class="note-box">
    <textarea id="noteText" rows="2" placeholder="…or write a free-text note"></textarea>
    <button id="sendNote">leave a note</button>
  </div>
  <p class="latency" id="latency"></p>
</aside>

<div class="modal-scrim" id="modalScrim" hidden></div>
<div class="modal" id="modal" hidden>
  <h3 id="modalTitle">Approve gate?</h3>
  <p id="modalBody"></p>
  <div class="modal-row">
    <button class="ghost" id="modalCancel">cancel</button>
    <button class="danger" id="modalOk">confirm</button>
  </div>
</div>

<div class="drawer" id="drawer" hidden>
  <div class="drawer-head"><span id="drawerTitle">output</span><button class="x" id="drawerClose">✕</button></div>
  <pre id="drawerBody"></pre>
</div>

<div class="toast" id="toast" hidden></div>
<div class="stale-veil" id="staleVeil" hidden>the glass has fogged — data may be stale</div>

<script src="app.js"></script>
</body>
</html>
